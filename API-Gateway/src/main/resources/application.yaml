spring:
  application:
    name: API-Gateway

server:
  port: 8080

  cloud:
    gateway:
      routes:
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/events/**

        - id: auth-service
          uri: lb://authentication-service
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/bookings/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payments/**


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka