spring.application.name=Payment_Service

# Server port (pick a unique one; several existing services use 8083/8085/8086/8087)
server.port=8088

# H2 Database config (separate DB per-service)
spring.datasource.url=jdbc:h2:mem:paymentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
