
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Venues</title>
</head>
<body>

<h2>Venue List</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Location</th>
        <th>Capacity</th>
    </tr>
    <tr th:each="venue : ${venues}">
        <td th:text="${venue.id}"></td>
        <td th:text="${venue.name}"></td>
        <td th:text="${venue.location}"></td>
        <td th:text="${venue.capacity}"></td>
    </tr>
</table>

</body>
</html>
