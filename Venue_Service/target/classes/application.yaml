spring:
  application:
    name: Venue_Service

  datasource:

    url: jdbc:mysql://localhost:3306/venue_db
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:

      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

        dialect: org.hibernate.dialect.MySQLDialect

server:

  port: 8081